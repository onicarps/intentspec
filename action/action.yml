name: "IntentSpec CI"
description: "Run intentspec status or ci checks for intent.yaml files"
inputs:
  path:
    description: "File or directory to check (directories glob **/intent.yaml)"
    default: "."
    required: false
  min-coverage:
    description: "Minimum coverage threshold (0-100). Exit 3 if below. Used only with full ci mode."
    default: "0"
    required: false
  strict:
    description: "Fail on warnings too (promotes exit code 2 to 1). Used only with full ci mode."
    default: "false"
    required: false
  status-only:
    description: "Run intentspec status (validate + lint + test) instead of full ci"
    default: "true"
    required: false
  comment:
    description: "Post a PR comment with results (full ci mode only)"
    default: "false"
    required: false
runs:
  using: "composite"
  steps:
    - name: Install intentspec
      shell: bash
      run: pip install intentspec

    - name: Run intentspec status
      if: inputs.status-only == 'true'
      id: status
      shell: bash
      run: |
        OUTPUT=$(intentspec status "${{ inputs.path }}" --format json)
        echo "result<<EOF" >> "$GITHUB_OUTPUT"
        echo "$OUTPUT" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
        exit $?

    - name: Run intentspec ci
      if: inputs.status-only != 'true'
      id: ci
      shell: bash
      run: |
        STRICT_FLAG=""
        if [ "${{ inputs.strict }}" = "true" ]; then
          STRICT_FLAG="--strict"
        fi

        OUTPUT=$(intentspec ci "${{ inputs.path }}" \
          --min-coverage "${{ inputs.min-coverage }}" \
          $STRICT_FLAG \
          --format json)

        echo "result<<EOF" >> "$GITHUB_OUTPUT"
        echo "$OUTPUT" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
        exit $?

    - name: Post PR comment with score and coverage
      if: github.event_name == 'pull_request' && inputs.comment == 'true' && inputs.status-only != 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const result = JSON.parse(`${{ steps.ci.outputs.result }}`);
          const files = result.files || [];
          const lines = ['## IntentSpec CI Results'];
          for (const f of files) {
            const score = f.score !== null ? `~${Math.round(f.score)}/100` : 'N/A';
            const coverage = f.coverage !== null ? `${f.coverage}%` : 'N/A';
            const status = f.exit_code === 0 ? '✅' : f.exit_code === 2 ? '⚠️' : '❌';
            lines.push(`${status} **${f.path}** — score: ${score}, coverage: ${coverage}`);
          }
          lines.push('');
          lines.push(`Overall exit code: **${result.exit_code}**`);
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: lines.join('\n')
          });