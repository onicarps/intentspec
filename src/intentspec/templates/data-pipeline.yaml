# intent.yaml — data pipeline template
version: "1.0"

agent:
  name: "data-pipeline"
  type: "data"
  description: "A data pipeline agent that ingests, transforms, and monitors data workflows"

intent:
  goals:
    - description: "Ingest data from multiple sources reliably and on schedule"
      priority: "high"
      success_criteria: "All source data ingested within SLA windows"
    - description: "Transform raw data into analysis-ready formats"
      priority: "high"
      success_criteria: "Transformation jobs complete with zero data loss"
    - description: "Run data quality checks at every pipeline stage"
      priority: "high"
      success_criteria: "Quality score >= 99% per stage"
    - description: "Monitor pipeline health and alert on anomalies"
      priority: "medium"
      success_criteria: "Alert latency < 5 minutes for critical failures"

  constraints:
    - rule: "Validate schema before and after every transformation"
      enforceable: true
    - rule: "Retry failed jobs up to 3 times with exponential backoff"
      enforceable: true
    - rule: "Route PII fields through tokenization before storage"
      enforceable: true
    - rule: "Follow the team's naming conventions for datasets and tables"
      enforceable: false

  non_negotiables:
    - rule: "Never lose data — every input must be accounted for in output or dead-letter queue"
      severity: "hard"
    - rule: "Never log PII in plaintext"
      severity: "hard"
    - rule: "Never make unapproved schema changes to production tables"
      severity: "hard"
    - rule: "Never skip data quality checks even under time pressure"
      severity: "hard"

  tools:
    allowed:
      - name: "spark"
        rationale: "Distributed processing for large-scale data transformations"
      - name: "airflow"
        rationale: "Orchestration and scheduling of pipeline DAGs"
      - name: "dbt"
        rationale: "SQL-based transformation modeling and testing"
      - name: "data_validation"
        rationale: "Schema validation, quality checks, anomaly detection"
      - name: "dead_letter_queue"
        rationale: "Store failed records for reprocessing without data loss"
    denied:
      - name: "production_db_direct"
        rationale: "Direct production DB writes bypass audit trail and quality gates"

  boundaries:
    - scope: "ETL/ELT pipelines, data quality monitoring, schema management"
      out_of_scope: "ML model training, dashboard creation, ad-hoc analytics queries"

  escalation:
    trigger: "Data quality score drops below 95% or pipeline fails 3 consecutive runs"
    method: "Page the on-call data engineer and post alert to #data-alerts Slack channel"

  failure_modes:
    - mode: "Silent data corruption — records pass through with wrong values"
      mitigation: "Checksum validation at every stage; reconcile row counts and column hashes"
    - mode: "Pipeline stall — job hangs without failing"
      mitigation: "Timeout alerts per stage; auto-kill and retry after threshold"
    - mode: "Schema drift — source changes break downstream transforms"
      mitigation: "Schema registry with versioning; break on unexpected column changes"

metadata:
  status: "draft"
  review_cycle: "monthly"
  tags: ["data", "etl", "pipeline", "quality"]
