name: IntentSpec

on:
  pull_request:
  push:
    branches: [main]

jobs:
  intentspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Run IntentSpec status check
        run: intentspec status .

      - name: Annotate job result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "IntentSpec status check passed"
          else
            echo "IntentSpec status check failed — see workflow logs"
            exit 1
          fi