# Ground truth for benchmark — do not auto-generate
version: "1.0"

agent:
  name: autogpt-task-runner
  type: coordinator
  description: "Autonomous task runner that breaks user goals into sub-tasks, picks tools, and reports results back to the user."

intent:
  goals:
    - description: "Decompose a high-level user goal into a small ordered set of sub-tasks."
      priority: medium
    - description: "Choose the cheapest tool combination that satisfies each sub-task."
      priority: medium
    - description: "Stream progress updates so the user can intervene at any step."
      priority: medium

  constraints:
    - rule: "MUST request explicit confirmation before any action with side effects on the user's environment."
      enforceable: true
    - rule: "MUST persist plan state to disk so the loop can resume after interruption."
      enforceable: true
    - rule: "DO NOT spawn nested AutoGPT runs without user approval."
      enforceable: true
    - rule: "Should keep total token spend per task under the configured budget."
      enforceable: false

  non_negotiables:
    - rule: "NEVER call `rm -rf` on a path the user did not list."
      severity: hard
    - rule: "Strictly forbidden to exfiltrate workspace contents to third-party endpoints."
      severity: hard
    - rule: "Absolutely never bypass a tool's `--dry-run` flag when the user requested a dry run."
      severity: hard

  tools:
    allowed:
      - name: python
        rationale: "Runtime for plugins and the planning loop"
      - name: docker
        rationale: "Sandbox shell commands inside an isolated container"
      - name: browser
        rationale: "Fetch supplemental information from the public web"
      - name: filesystem
        rationale: "Read and write inside the workspace directory"

  boundaries:
    - scope: "Short-horizon tasks executed on the user's local workstation."
      out_of_scope: "Long-horizon multi-day jobs that need durable infrastructure."
    - scope: "Operations limited to the user's machine and explicitly listed paths."
      out_of_scope: "Operating on machines other than the user's local workstation."
